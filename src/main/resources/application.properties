spring.application.name=IT211_SS12_02
#Config datasource
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/it211_ss12?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=yen030306.

#@Config jpa
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

#Config logging    Cấp độ log: TRACE  -   DEBUG  -  INFO   -  WARN   -  ERROR
logging.file.name=logs/application.log
logging.pattern.console=%d{yyyy-MM-dd hh:mm:ss.SSS} -  %highlight(%-5level) - %cyan(%logger{50}) - %green(%msg%n)
logging.logback.rollingpolicy.max-file-size=20MB
logging.logback.rollingpolicy.max-history=30
# Bước 1: Đặt log level root = WARN
logging.level.root=WARN

# Bước 2: Đặt log level riêng cho package controller và service (thay đổi package theo đúng dự án của bạn)
//level.com.it211_ss12_02.controller=INFO
//level.com.it211_ss12_02.service=INFO

